<!DOCTYPE html>
<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Registro | UniShare Scholarly Atelier</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "error-container": "#ffdad6",
              "on-secondary-container": "#006e6e",
              "tertiary-container": "#884800",
              "surface-dim": "#d9d9e2",
              "on-background": "#191c21",
              "primary": "#003f87",
              "inverse-on-surface": "#f0f0f9",
              "primary-fixed-dim": "#acc7ff",
              "on-surface": "#191c21",
              "on-secondary": "#ffffff",
              "surface-tint": "#115cb9",
              "error": "#ba1a1a",
              "background": "#f9f9ff",
              "on-primary-fixed": "#001a40",
              "outline": "#727784",
              "on-surface-variant": "#424752",
              "surface-container-low": "#f2f3fc",
              "surface-container-high": "#e7e8f0",
              "secondary-container": "#90efef",
              "secondary": "#006a6a",
              "primary-container": "#0056b3",
              "on-tertiary-fixed": "#2f1500",
              "surface-container-highest": "#e1e2ea",
              "primary-fixed": "#d7e2ff",
              "tertiary": "#663500",
              "on-primary-fixed-variant": "#004491",
              "inverse-primary": "#acc7ff",
              "on-secondary-fixed": "#002020",
              "surface-variant": "#e1e2ea",
              "on-tertiary-container": "#ffc395",
              "surface": "#f9f9ff",
              "on-primary-container": "#bbd0ff",
              "on-error": "#ffffff",
              "surface-bright": "#f9f9ff",
              "inverse-surface": "#2e3037",
              "surface-container": "#ededf6",
              "tertiary-fixed": "#ffdcc3",
              "surface-container-lowest": "#ffffff",
              "on-tertiary": "#ffffff",
              "secondary-fixed": "#93f2f2",
              "on-secondary-fixed-variant": "#004f4f",
              "on-tertiary-fixed-variant": "#6e3900",
              "tertiary-fixed-dim": "#ffb77d",
              "outline-variant": "#c2c6d4",
              "on-primary": "#ffffff",
              "on-error-container": "#93000a",
              "secondary-fixed-dim": "#76d6d5"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .mesh-bg {
            background-color: #f9f9ff;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 63, 135, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(0, 86, 179, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 63, 135, 0.08) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(0, 86, 179, 0.05) 0px, transparent 50%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col mesh-bg">
<header class="fixed top-0 w-full z-50 px-6 py-6 flex justify-center items-center pointer-events-none">
<div class="flex items-center gap-2 pointer-events-auto">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">school</span>
<span class="font-headline font-extrabold text-2xl tracking-tight bg-gradient-to-r from-primary to-primary-container bg-clip-text text-transparent">UniShare</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-4 py-24">
<div class="w-full max-w-lg bg-surface-container-lowest rounded-xl shadow-[0_8px_32px_rgba(0,63,135,0.06)] p-8 md:p-12 border border-outline-variant/10">
<div class="mb-10 text-center">
<h1 class="font-headline text-3xl font-extrabold text-on-surface mb-2 tracking-tight">Crea tu cuenta</h1>
</div>

<!-- Mensaje de error -->
<div id="error-msg" class="hidden mb-4 p-3 rounded-xl bg-error-container text-on-error-container text-sm font-semibold"></div>
<!-- Mensaje de éxito -->
<div id="success-msg" class="hidden mb-4 p-3 rounded-xl bg-secondary-container text-on-secondary-container text-sm font-semibold"></div>

<form class="space-y-6" onsubmit="handleRegister(event)">
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface-variant ml-1" for="name">Nombre</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">person</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-surface-container-low border-transparent rounded-xl focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary focus:border-primary transition-all text-on-surface placeholder:text-outline/60" id="name" name="name" placeholder="Tu nombre completo" required="" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface-variant ml-1" for="email">Correo institucional</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-surface-container-low border-transparent rounded-xl focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary focus:border-primary transition-all text-on-surface placeholder:text-outline/60" id="email" name="email" placeholder="ejemplo@universidad.edu" required="" type="email"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface-variant ml-1" for="career">Carrera</label>
<select class="block w-full px-4 py-3 bg-surface-container-low border-transparent rounded-xl focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary focus:border-primary transition-all text-on-surface appearance-none" id="career" name="career" required="">
<option disabled="" selected="" value="">Selecciona carrera</option>
<option value="Ingeniería de Software">Ingeniería de Software</option>
<option value="Lic. en Administración">Lic. en Administración</option>
<option value="Ingeniería Industrial">Ingeniería Industrial</option>
<option value="Lic. en Diseño Gráfico">Lic. en Diseño Gráfico</option>
<option value="Lic. en Derecho">Lic. en Derecho</option>
</select>
</div>
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface-variant ml-1" for="semester">Cuatrimestre</label>
<select class="block w-full px-4 py-3 bg-surface-container-low border-transparent rounded-xl focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary focus:border-primary transition-all text-on-surface appearance-none" id="semester" name="semester" required="">
<option disabled="" selected="" value="">Nivel</option>
<option value="1">1º Cuatrimestre</option>
<option value="2">2º Cuatrimestre</option>
<option value="3">3º Cuatrimestre</option>
<option value="4">4º Cuatrimestre</option>
<option value="5">5º Cuatrimestre</option>
<option value="6">6º Cuatrimestre</option>
<option value="7">7º Cuatrimestre</option>
<option value="8">8º Cuatrimestre</option>
<option value="9">9º Cuatrimestre</option>
</select>
</div>
</div>
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface-variant ml-1" for="password">Contraseña</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-surface-container-low border-transparent rounded-xl focus:bg-surface-container-lowest focus:ring-1 focus:ring-primary focus:border-primary transition-all text-on-surface placeholder:text-outline/60" id="password" name="password" placeholder="Mínimo 8 caracteres" required="" minlength="8" type="password"/>
</div>
</div>
<div class="pt-4">
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold py-4 px-6 rounded-full hover:shadow-lg hover:shadow-primary/20 active:scale-[0.98] transition-all duration-200 disabled:opacity-60 disabled:cursor-not-allowed" type="submit" id="submit-btn">
                        Registrarse
                    </button>
</div>
</form>
<div class="mt-8 text-center">
<p class="text-on-surface-variant font-body text-sm">
                    ¿Ya tienes cuenta? 
                    <a class="text-primary font-semibold hover:underline decoration-2 underline-offset-4 ml-1 transition-all" href="login.html">
                        Iniciar sesión
                    </a>
</p>
</div>
</div>
</main>
<footer class="w-full py-8 px-10 flex flex-col md:flex-row justify-between items-center gap-4 bg-transparent border-t border-outline-variant/5">
<span class="font-body text-xs tracking-wide text-slate-500 uppercase">© 2024 UniShare Scholarly Atelier</span>
</footer>

<script>
  const API = 'http://192.168.56.101'

  // Si ya hay sesión activa, redirigir al dashboard
  if (localStorage.getItem('token')) {
    window.location.href = 'dashboard.html'
  }

  async function handleRegister(e) {
    e.preventDefault()

    const nombre = document.getElementById('name').value
    const correo = document.getElementById('email').value
    const carrera = document.getElementById('career').value
    const cuatrimestre = parseInt(document.getElementById('semester').value)
    const password = document.getElementById('password').value
    const btn = document.getElementById('submit-btn')
    const errorMsg = document.getElementById('error-msg')
    const successMsg = document.getElementById('success-msg')

    errorMsg.classList.add('hidden')
    successMsg.classList.add('hidden')
    btn.disabled = true
    btn.textContent = 'Registrando...'

    try {
      const res = await fetch(`${API}/api/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, correo, carrera, cuatrimestre, password })
      })

      const data = await res.json()

      if (!res.ok) {
        errorMsg.textContent = data.error || 'Error al registrarse'
        errorMsg.classList.remove('hidden')
        btn.disabled = false
        btn.textContent = 'Registrarse'
        return
      }

      successMsg.textContent = '¡Cuenta creada exitosamente! Redirigiendo al login...'
      successMsg.classList.remove('hidden')

      setTimeout(() => {
        window.location.href = 'login.html'
      }, 1500)

    } catch (err) {
      errorMsg.textContent = 'Error de conexión con el servidor'
      errorMsg.classList.remove('hidden')
      btn.disabled = false
      btn.textContent = 'Registrarse'
    }
  }
</script>

</body></html>
