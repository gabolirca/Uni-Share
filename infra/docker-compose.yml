services:

  postgres:
    image: postgres:15
    container_name: unishare_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: unishare_db
      POSTGRES_USER: unishare_user
      POSTGRES_PASSWORD: unishare_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - unishare_net

  api_1:
    build: ../backend
    container_name: unishare_api_1
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: unishare_db
      DB_USER: unishare_user
      DB_PASSWORD: unishare_pass
      JWT_SECRET: cambia_esto_por_algo_seguro
      JWT_EXPIRES_IN: 7d
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - postgres
    networks:
      - unishare_net

  api_2:
    build: ../backend
    container_name: unishare_api_2
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: unishare_db
      DB_USER: unishare_user
      DB_PASSWORD: unishare_pass
      JWT_SECRET: cambia_esto_por_algo_seguro
      JWT_EXPIRES_IN: 7d
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - postgres
    networks:
      - unishare_net

  api_3:
    build: ../backend
    container_name: unishare_api_3
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: unishare_db
      DB_USER: unishare_user
      DB_PASSWORD: unishare_pass
      JWT_SECRET: cambia_esto_por_algo_seguro
      JWT_EXPIRES_IN: 7d
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - postgres
    networks:
      - unishare_net

  nginx:
    image: nginx:alpine
    container_name: unishare_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api_1
      - api_2
      - api_3
    networks:
      - unishare_net

networks:
  unishare_net:
    driver: bridge

volumes:
  postgres_data:
  uploads_data: