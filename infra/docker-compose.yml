services:

  postgres_master:
    image: postgres:15
    container_name: unishare_db_master
    restart: unless-stopped
    environment:
      POSTGRES_DB: unishare_db
      POSTGRES_USER: unishare_user
      POSTGRES_PASSWORD: unishare_pass
      POSTGRES_REPLICATION_USER: replicator
      POSTGRES_REPLICATION_PASSWORD: replicator_pass
    command: |
      postgres
      -c wal_level=replica
      -c max_wal_senders=3
      -c wal_keep_size=64
    volumes:
      - postgres_master_data:/var/lib/postgresql/data
    networks:
      - unishare_net

  postgres_replica:
    image: postgres:15
    container_name: unishare_db_replica
    restart: unless-stopped
    user: root
    environment:
      PGPASSWORD: replicator_pass
    command: |
      bash -c "
      rm -rf /var/lib/postgresql/data/*
      until pg_basebackup -h postgres_master -U replicator -D /var/lib/postgresql/data -Fp -Xs -P -R --no-password; do
        echo 'Esperando master...'
        sleep 3
      done
      chmod 700 /var/lib/postgresql/data
      chown -R postgres:postgres /var/lib/postgresql/data
      exec su postgres -c 'postgres -D /var/lib/postgresql/data'
      "
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    depends_on:
      - postgres_master
    networks:
      - unishare_net

  api_1:
    build: ../backend
    container_name: unishare_api_1
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres_master
      DB_PORT: 5432
      DB_NAME: unishare_db
      DB_USER: unishare_user
      DB_PASSWORD: unishare_pass
      JWT_SECRET: cambia_esto_por_algo_seguro
      JWT_EXPIRES_IN: 7d
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - postgres_master
    networks:
      - unishare_net

  api_2:
    build: ../backend
    container_name: unishare_api_2
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres_master
      DB_PORT: 5432
      DB_NAME: unishare_db
      DB_USER: unishare_user
      DB_PASSWORD: unishare_pass
      JWT_SECRET: cambia_esto_por_algo_seguro
      JWT_EXPIRES_IN: 7d
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - postgres_master
    networks:
      - unishare_net

  api_3:
    build: ../backend
    container_name: unishare_api_3
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres_master
      DB_PORT: 5432
      DB_NAME: unishare_db
      DB_USER: unishare_user
      DB_PASSWORD: unishare_pass
      JWT_SECRET: cambia_esto_por_algo_seguro
      JWT_EXPIRES_IN: 7d
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - postgres_master
    networks:
      - unishare_net

  nginx:
    image: nginx:alpine
    container_name: unishare_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api_1
      - api_2
      - api_3
    networks:
      - unishare_net

networks:
  unishare_net:
    driver: bridge

volumes:
  postgres_master_data:
  postgres_replica_data:
  uploads_data: