<!DOCTYPE html>
<html class="light" lang="es"><head>
<meta charset="utf-8"/>

<title>UniShare - Iniciar sesión</title>

              "surface-container-highest": "#e1e2ea",
              "on-primary": "#ffffff",
              "inverse-on-surface": "#f0f0f9",
              "secondary-container": "#90efef",
              "error-container": "#ffdad6",
              "primary-fixed": "#d7e2ff",
              "tertiary-container": "#884800",
              "surface-container-high": "#e7e8f0",
              "surface": "#f9f9ff",
              "on-tertiary": "#ffffff",
              "on-tertiary-fixed-variant": "#6e3900",
              "on-secondary-fixed": "#002020",
              "on-primary-container": "#bbd0ff",
              "secondary": "#006a6a",
              "on-background": "#191c21",
              "tertiary": "#663500",
              "on-primary-fixed-variant": "#004491",
              "surface-bright": "#f9f9ff",
              "primary-fixed-dim": "#acc7ff",
              "tertiary-fixed": "#ffdcc3",
              "surface-container-low": "#f2f3fc",
              "surface-container": "#ededf6",
              "tertiary-fixed-dim": "#ffb77d",
              "secondary-fixed": "#93f2f2",
              "primary-container": "#0056b3",
              "outline": "#727784",

              "on-secondary-fixed-variant": "#004f4f",

      }

<style>
        .mesh-gradient {
            background-color: #f9f9ff;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 63, 135, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(144, 239, 239, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 86, 179, 0.05) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(172, 199, 255, 0.2) 0px, transparent 50%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed">
<main class="min-h-screen flex items-center justify-center p-6 mesh-gradient relative overflow-hidden">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/5 rounded-full blur-[120px]"></div>
<div class="w-full max-w-md z-10">
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary text-on-primary mb-6 shadow-xl shadow-primary/20">
<span class="material-symbols-outlined text-4xl" data-icon="school">school</span>
</div>
<h1 class="font-headline font-extrabold text-4xl tracking-tight text-primary mb-2">UniShare</h1>
</div>
<div class="glass-panel border border-white/40 shadow-[0_32px_64px_-12px_rgba(0,63,135,0.08)] rounded-[2.5rem] p-8 md:p-12 transition-all duration-300" id="login-container">
<div class="mb-8">
<h2 class="font-headline font-bold text-2xl text-on-surface">Iniciar sesión</h2>
<div class="h-1 w-12 bg-primary rounded-full mt-2"></div>
</div>

<!-- Mensaje de error -->
<div id="error-msg" class="hidden mb-4 p-3 rounded-xl bg-error-container text-on-error-container text-sm font-semibold"></div>

<form class="space-y-6" onsubmit="handleLogin(event)">
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant ml-1" for="email">Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface-container-low border-none rounded-2xl text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300" id="email" name="email" placeholder="tu@universidad.edu" type="email" required/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-sm font-semibold text-on-surface-variant" for="password">Contraseña</label>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface-container-low border-none rounded-2xl text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-300" id="password" name="password" placeholder="••••••••" type="password" required/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer text-outline hover:text-on-surface transition-colors" onclick="togglePassword()">
<span class="material-symbols-outlined text-[20px]" id="toggle-icon">visibility</span>
</div>
</div>
</div>
<div class="pt-4 space-y-4">
<button class="w-full py-4 px-6 rounded-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold text-lg shadow-[0_8px_24px_-4px_rgba(0,63,135,0.4)] hover:shadow-[0_12px_32px_-4px_rgba(0,63,135,0.5)] active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed" type="submit" id="submit-btn">
<span>Iniciar sesión</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="text-center">
<a href="registro.html" class="inline-block text-primary font-semibold text-sm hover:underline underline-offset-4 decoration-primary/30 transition-all">
                                ¿No tienes cuenta? Crear cuenta
                            </a>
</div>
</div>
</form>
</div>
</div>
</main>

<script>
  const API = 'https://shockheaded-unvigorously-lashaun.ngrok-free.dev'

  function togglePassword() {
    const input = document.getElementById('password')
    const icon = document.getElementById('toggle-icon')
    if (input.type === 'password') {
      input.type = 'text'
      icon.textContent = 'visibility_off'
    } else {
      input.type = 'password'
      icon.textContent = 'visibility'
    }
  }

  async function handleLogin(e) {
    e.preventDefault()
    const correo = document.getElementById('email').value
    const password = document.getElementById('password').value
    const btn = document.getElementById('submit-btn')
    const errorMsg = document.getElementById('error-msg')

    errorMsg.classList.add('hidden')
    btn.disabled = true
    btn.innerHTML = '<span>Iniciando sesión...</span>'

    try {
      const res = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ correo, password })
      })

      const data = await res.json()

      if (!res.ok) {
        errorMsg.textContent = data.error || 'Credenciales incorrectas'
        errorMsg.classList.remove('hidden')
        btn.disabled = false
        btn.innerHTML = '<span>Iniciar sesión</span><span class="material-symbols-outlined">arrow_forward</span>'
        return
      }

      localStorage.setItem('token', data.token)
      localStorage.setItem('user', JSON.stringify(data.user))
      window.location.href = 'dashboard.html'

    } catch (err) {
      errorMsg.textContent = 'Error de conexión con el servidor'
      errorMsg.classList.remove('hidden')
      btn.disabled = false
      btn.innerHTML = '<span>Iniciar sesión</span><span class="material-symbols-outlined">arrow_forward</span>'
    }
  }

  // Si ya hay sesión, redirigir al dashboard
  if (localStorage.getItem('token')) {
    window.location.href = 'dashboard.html'
  }
</script>

</body></html>
